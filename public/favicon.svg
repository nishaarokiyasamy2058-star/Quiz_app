<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Quiz app favicon">
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.18" />
    </filter>
  </defs>
  <circle cx="32" cy="32" r="30" fill="#3b82f6" filter="url(#shadow)" />
  <text x="32" y="40" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#ffffff">Q</text>
  <!-- small tail to suggest a question mark/quiz feel -->
  <circle cx="44" cy="46" r="2.2" fill="#ffffff" opacity="0.95" />
</svg>
