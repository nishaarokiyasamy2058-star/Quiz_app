<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="yellowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE66D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFC93D;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Circular background with gradient -->
  <circle cx="50" cy="50" r="50" fill="url(#yellowGradient)" />
  
  <!-- White question mark -->
  <text x="50" y="70" font-size="60" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">?</text>
</svg>